---
- name: Create app root
  ansible.builtin.file:
    path: "{{ app_root }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Deploy static app page
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ app_root }}/index.html"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
